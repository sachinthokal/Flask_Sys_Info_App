name: Build and Push to DockerHub on Tag

# This workflow triggers only when a tag starting with 'v' is pushed (e.g., v1.0.0, v2.1.0)
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Map the tag output from step to job level so the next job can access it
    outputs:
      tag_version: ${{ steps.vars.outputs.tag }}

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Extract the exact tag name (e.g., v1.0.0) without refs/tags/ prefix
      - name: Set Tag Output
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # 3. Log in to DockerHub using GitHub Secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Set up Docker Buildx for advanced and faster build capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Extract metadata (tags, labels) from the Git tag event
      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/flask-sys-info-app
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      # 6. Build the Docker image and push it to DockerHub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile 
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push # Runs only if the Docker image builds and pushes successfully
    
    steps:
      # 1. Checkout your dedicated ArgoCD / GitOps Manifest repository
      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          # TODO: Replace with your actual GitHub username and manifest repo name
          repository: 'sachinthokal/ArgoCD_For_Devops' 
          # TODO: Make sure the default GITHUB_TOKEN or your Personal Access Token (PAT) has Write permissions
          token: ${{ secrets.GITOPS_PAT }} 

      # 2. Update the image tag inside your deployment manifest file using sed
      - name: Update Image Tag in Manifest
        run: |
          # Matches the image pattern and replaces everything after the colon with the new tag version
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/flask-sys-info-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/flask-sys-info-app:${{ needs.build-and-push.outputs.tag_version }}|g" Sys_Info_App/manifests/deployment.yaml
          
      # 3. Commit the manifest update and push it back to the repo
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Sys_Info_App/manifests/deployment.yaml
          git commit -m "chore : update flask-sys-info-app image tag to ${{ needs.build-and-push.outputs.tag_version }} [skip ci]"
          
          # TODO: Replace 'main' with your manifest repository's default branch if it uses 'master'
          git push origin main