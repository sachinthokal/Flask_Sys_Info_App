name: Build and Push to DockerHub on Tag

# This workflow triggers only when a tag starting with 'v' is pushed (e.g., v1.0.0, v2.1.0)
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log in to DockerHub using GitHub Secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Set up Docker Buildx for advanced and faster build capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Extract metadata (tags, labels) from the Git tag event
      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Replace 'your-repo-name' with your actual DockerHub repository name
          images: ${{ secrets.DOCKERHUB_USERNAME }}/flask-sys-info-app
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      # 5. Build the Docker image and push it to DockerHub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile # Change this if your Dockerfile is in a subdirectory
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}